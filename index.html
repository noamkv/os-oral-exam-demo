<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת הבחינות בעל פה - קורס מערכות הפעלה</title>
    <meta name="description" content="פורטל למידע ושיבוץ למערכת הבחינות בעל פה בקורס מערכות הפעלה.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container" id="main-container">

        <header class="header">
            <h1>מערכת הבחינות - מערכות הפעלה</h1>
            <p>כאן תוכלו למצוא הסבר על מערכת הבחינות בעל פה. שימו לב: בכדי להיבחן, עליכם להשתבץ דרך הלינק למטה.</p>
        </header>

        <!-- Video Slot -->
        <div class="video-slot" id="video-placeholder" aria-label="Video Placeholder">
            <div class="video-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
            </div>
            <div class="video-text">סרטון הסבר יעלה לכאן בהמשך</div>
            <div class="video-text-sub">המקום שמור לסרטון הדגמה מצוות הקורס</div>
        </div>

        <!-- Call to Actions -->
        <div class="actions">
            <div style="display: flex; flex-direction: column; align-items: center; gap: 0.8rem;">
                <a href="https://calendar.app.google/rQ9cVBa9Xbc49BBF8" target="_blank" rel="noopener noreferrer"
                    class="btn btn-primary" id="calendar-link">
                    <!-- Google Calendar Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    שיבוץ למועד בחינה
                </a>
                <p style="color: #94a3b8; font-size: 0.95rem; text-align: center; max-width: 90%;">
                    * שימו לב: נא להירשם רק פעם אחת
                </p>
            </div>
        </div>

    </div>

    <script>
        // ברגע שיהיה סרטון יוטיוב מוכן, פשוט תעתיק את ה-ID שלו לכאן
        // לדוגמה, אם הקישור הוא https://www.youtube.com/watch?v=dQw4w9WgXcQ אז ה-ID הוא dQw4w9WgXcQ
        const YOUTUBE_VIDEO_ID = 'YMqPibiEYIE';

        const videoSlot = document.getElementById('video-placeholder');

        if (YOUTUBE_VIDEO_ID) {
            // ניקוי מוחלט של מחלקת הפלייסחולדר שעלולה לחסום לחיצות עם ::before או אפקטים אחרים
            videoSlot.className = '';
            videoSlot.style.width = '100%';
            videoSlot.style.aspectRatio = '16 / 9';
            videoSlot.style.borderRadius = '16px';
            videoSlot.style.overflow = 'hidden';

            // החלפת הפלייסחולדר בנגן יוטיוב
            videoSlot.innerHTML = `
                <iframe 
                    width="100%" 
                    height="100%" 
                    src="https://www.youtube.com/embed/${YOUTUBE_VIDEO_ID}" 
                    title="YouTube video player" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            `;
        } else {
            // התנהגות ברירת מחדל עד שיהיה סרטון
            videoSlot.addEventListener('click', function () {
                console.log('Video area clicked! Waiting for video integration...');
                alert('כאן יופיע בהמשך סרטון הסבר על מערכת הבחינות!');
            });
        }
    </script>
</body>

</html>
