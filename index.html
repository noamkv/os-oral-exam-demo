<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event & Media Portal</title>
    <meta name="description" content="A premium portal for viewing media and scheduling events.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container" id="main-container">
        
        <header class="header">
            <h1>Welcome to the Experience</h1>
            <p>Your upcoming media and scheduled events are right here</p>
        </header>

        <!-- Video Slot -->
        <div class="video-slot" id="video-placeholder" aria-label="Video Placeholder">
            <div class="video-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
            </div>
            <div class="video-text">Video Placeholder</div>
            <div class="video-text-sub">Your video will be integrated here</div>
        </div>

        <!-- Call to Actions -->
        <div class="actions">
            <a href="https://calendar.google.com/calendar/u/0/r/eventedit" target="_blank" rel="noopener noreferrer" class="btn btn-primary" id="calendar-link">
                <!-- Google Calendar Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                Open Google Calendar
            </a>
        </div>

    </div>

    <script>
        // Simple interactivity placeholder for when the video is ready
        document.getElementById('video-placeholder').addEventListener('click', function() {
            console.log('Video area clicked! Waiting for video integration...');
            alert('This space is reserved for your upcoming video!');
        });
    </script>
</body>
</html>
